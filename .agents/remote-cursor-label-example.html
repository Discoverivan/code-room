<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Плашка удалённого курсора</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #101720; color: #edf2f7; }
    body { max-width: 760px; margin: 0 auto; padding: 48px 24px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { color: #aebbc9; }
    .examples { display: grid; gap: 20px; margin-top: 28px; }
    .example { border: 1px solid #2c3948; border-radius: 12px; overflow: hidden; background: #151e29; }
    .example h2 { margin: 0; padding: 12px 16px; font-size: 14px; background: #1b2633; }
    .code { position: relative; height: 118px; padding: 38px 22px; font: 18px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; }
    .remote-caret { position: relative; display: inline-block; width: 0; height: 1.35em; vertical-align: text-bottom; border-left: 2px solid #d61e25; margin: 0 -1px; }
    .remote-name { position: absolute; top: -1.05em; left: -1px; z-index: 1; padding: 4px 8px; border-radius: 5px; color: #fff; background: #d61e25; font: 600 11px/1.2 Inter, system-ui, sans-serif; white-space: nowrap; }
    .fixed .remote-name { left: -2px; border-radius: 5px 5px 5px 0; }
    code { color: #8bd5ff; }
    .note { margin: 0; padding: 0 16px 14px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Плашка удалённого курсора</h1>
  <p>Слева — исходное положение. Справа левый край плашки выровнен с курсором, а нижний левый угол сделан прямым.</p>

  <div class="examples">
    <section class="example">
      <h2>До</h2>
      <div class="code"><code>account_id;</code><span class="remote-caret"><span class="remote-name">Андрей</span></span></div>
      <p class="note">Курсор смещён относительно левого края плашки.</p>
    </section>

    <section class="example fixed">
      <h2>После</h2>
      <div class="code"><code>account_id;</code><span class="remote-caret"><span class="remote-name">Андрей</span></span></div>
      <p class="note">Левый край плашки совпадает с курсором; нижний левый угол прямой.</p>
    </section>
  </div>
</body>
</html>
