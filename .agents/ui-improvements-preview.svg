<svg xmlns="http://www.w3.org/2000/svg" width="960" height="610" viewBox="0 0 960 610" role="img" aria-labelledby="title description">
  <title id="title">Сравнение доработок интерфейса</title>
  <desc id="description">Сравнение плашки удалённого курсора и иконки настроек до и после исправления.</desc>
  <rect width="960" height="610" fill="#10151d"/>
  <style>
    .title { fill: #eef1f7; font: 600 25px Inter, Arial, sans-serif; }
    .subtitle { fill: #8993a5; font: 14px Inter, Arial, sans-serif; }
    .label { fill: #eef1f7; font: 600 15px Inter, Arial, sans-serif; }
    .note { fill: #8993a5; font: 13px Inter, Arial, sans-serif; }
    .code { fill: #8bd5ff; font: 18px Consolas, monospace; }
  </style>
  <text x="42" y="52" class="title">Доработки интерфейса</text>
  <text x="42" y="78" class="subtitle">Сравнение состояний «было / стало»</text>

  <rect x="42" y="110" width="876" height="205" rx="14" fill="#151b25" stroke="#242d3b"/>
  <text x="68" y="145" class="label">Плашка удалённого курсора</text>
  <text x="68" y="180" class="note">Было</text>
  <rect x="68" y="193" width="378" height="94" rx="9" fill="#101720"/>
  <text x="92" y="249" class="code">account_id;</text>
  <rect x="250" y="201" width="2" height="65" fill="#d61e25"/>
  <rect x="254" y="201" width="85" height="29" rx="5" fill="#d61e25"/>
  <text x="267" y="220" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Андрей</text>
  <text x="68" y="307" class="note">Курсор смещён от левого края плашки.</text>

  <text x="494" y="180" class="note">Стало</text>
  <rect x="494" y="193" width="378" height="94" rx="9" fill="#101720"/>
  <text x="518" y="249" class="code">account_id;</text>
  <rect x="676" y="201" width="2" height="65" fill="#d61e25"/>
  <path d="M676 201h85a5 5 0 0 1 5 5v19a5 5 0 0 1-5 5h-85z" fill="#d61e25"/>
  <text x="689" y="220" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Андрей</text>
  <text x="494" y="307" class="note">Курсор и левый край плашки выровнены.</text>

  <rect x="42" y="345" width="876" height="220" rx="14" fill="#151b25" stroke="#242d3b"/>
  <text x="68" y="380" class="label">Иконка настроек</text>
  <text x="68" y="415" class="note">Было</text>
  <rect x="68" y="430" width="48" height="44" rx="12" fill="#151b25" stroke="#242d3b"/>
  <g transform="translate(81 442)" fill="none" stroke="#eef1f7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="10" r="3"/>
