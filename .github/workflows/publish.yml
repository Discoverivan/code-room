name: Publish container

on:
  workflow_call:
    inputs:
      version:
        description: Version tag without the v prefix
        required: true
        type: string
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/discoverivan/code-room
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version || github.ref_name }}
            type=semver,pattern={{major}},value=${{ inputs.version || github.ref_name }}
            type=raw,value=latest
      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/discoverivan/code-room
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
