name: Automatic release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: automatic-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: version
        name: Calculate next version
        shell: bash
        run: |
          latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "$latest" ]]; then
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="${latest#v}"
          IFS=. read -r major minor patch <<< "$version"
          commits="$(git log "${latest}..HEAD" --format='%B')"

          if grep -Eq 'BREAKING CHANGE|^[a-z]+(\(.+\))?!:' <<< "$commits"; then
            major=$((major + 1)); minor=0; patch=0
          elif grep -Eq '^feat(\(.+\))?:' <<< "$commits"; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "v${VERSION}" --target "$GITHUB_SHA" --generate-notes --title "v${VERSION}"

  publish:
    needs: version
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ needs.version.outputs.version }}
    secrets: inherit
