name: Feature request
description: Suggest a focused improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: code room intentionally stays minimal. Explain the user problem before proposing a solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful solution.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
